apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-config
  namespace: busly
data:
  MONGO_INITDB_DATABASE: busly

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: busly
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          envFrom:
            - configMapRef:
                name: mongo-config
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
