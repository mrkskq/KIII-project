apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: busly-ingress
  namespace: busly
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: busly.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
